<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adon-ia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;height:100vh;display:flex;flex-direction:column}
.meta{font-size:14px;font-weight:700;color:#999;margin-top:4px}
header{background:#fff;border-bottom:1px solid #e0e0e0;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-size:18px;font-weight:600;color:#333}
header span{font-size:12px;padding:2px 8px;border-radius:8px;background:#e8e8e8;color:#888}
header span.on{background:#d4edda;color:#155724}
main{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#999}
.welcome h1{font-size:32px;color:#333;margin-bottom:4px}
.msgs{max-width:720px;width:100%;margin:0 auto}
.msg{display:flex;margin-bottom:16px;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{justify-content:flex-end}
.msg .b{max-width:70%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word;color:#fff}
.msg.user .b{background:#007aff;border-bottom-right-radius:4px}
.msg.assistant .b{background:#e9e9eb;color:#000;border-bottom-left-radius:4px}
footer{background:#fff;border-top:1px solid #e0e0e0;padding:16px 24px;flex-shrink:0}
.row{max-width:720px;margin:0 auto;display:flex;gap:8px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:12px;padding:4px}
.row:focus-within{border-color:#007aff}
.row textarea{flex:1;background:transparent;border:none;outline:none;font-size:14px;font-family:inherit;padding:8px 12px;resize:none;max-height:150px;line-height:1.5}
.row button{background:#007aff;color:#fff;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:600}
.row button:hover:not(:disabled){opacity:.9}
.row button:disabled{opacity:.4;cursor:default}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
</style>
</head>
<body>
<header>
  <h1>Adon-ia</h1>
  <span id="badge">verificando...</span>
</header>

<main id="chat">
  <div class="welcome" id="welcome">
    <h1>Adon-ia</h1>
    <p>Como posso ajudar?</p>
  </div>
  <div class="msgs" id="msgs"></div>
</main>

<footer>
  <div class="row">
    <textarea id="input" rows="1" placeholder="Digite sua mensagem..." onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
    <button id="btn" onclick="send()" disabled>Enviar</button>
  </div>
</footer>

<script>
const input=document.getElementById('input'), btn=document.getElementById('btn'), msgs=document.getElementById('msgs'), welcome=document.getElementById('welcome');
input.oninput=()=>{btn.disabled=!input.value.trim();input.style.height='auto';input.style.height=Math.min(input.scrollHeight,150)+'px'};

function addMsg(role, text, meta){
  welcome.style.display='none';
  let d=document.createElement('div'); d.className='msg '+role;
  let b=document.createElement('div'); b.className='b'; b.textContent=text;
  d.appendChild(b);
  if(meta){let m=document.createElement('div');m.className='meta';m.textContent=meta;d.appendChild(m)}
  msgs.appendChild(d);
  document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
}

function reset(){msgs.innerHTML='';welcome.style.display='flex';input.value='';btn.disabled=true;input.focus()}

async function send(){
  let t=input.value.trim(); if(!t)return;
  input.value='';btn.disabled=true;input.style.height='auto'; addMsg('user',t);
  let d=document.createElement('div'); d.className='msg assistant';
  let b=document.createElement('div'); b.className='b'; b.textContent='...';
  d.appendChild(b); msgs.appendChild(d);
  document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
  try{
    let r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t})});
    let j=await r.json();
    if(j.response){
      b.textContent=j.response;
      let m=document.createElement('div'); m.className='meta';
      m.textContent=j.time+' · '+j.tokens+' tokens · '+j.tps+' t/s';
      d.appendChild(m);
    }else{b.textContent='Erro: '+(j.error||'')}
  }catch{b.textContent='Erro de conexao'}
  document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
}

async function status(){
  try{
    let r=await fetch('/api/status'), j=await r.json();
    let badge=document.getElementById('badge');
    if(j.ok&&j.active){badge.textContent='online';badge.className='on'}
    else{badge.textContent='offline';badge.className=''}
  }catch{}
}
status();setInterval(status,10000);
</script>
</body>
</html>
